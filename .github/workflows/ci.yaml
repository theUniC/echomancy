name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install system dependencies (Bevy/Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libwayland-dev libx11-dev libxkbcommon-dev libvulkan-dev libasound2-dev libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Check compilation
        run: cargo check --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace
